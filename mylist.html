<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWave - My List</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="navbar-container"></div>

    <div id="search-results-section" style="display: none; padding: 0 4%; margin-top: 110px; min-height: 80vh;">
        <div class="section-header">
            <h2 class="section-title">Search Results for: <span id="search-query-text" style="color: #ff0000;"></span></h2>
            <button id="clear-search-btn" style="background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; float: right;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="search-cards-container" class="movies-container" style="flex-wrap: wrap; display: flex; gap: 20px; margin-top: 20px;">
            </div>
    </div>

    <section class="movies-section" id="main-mylist-section" style="margin-top: 110px; min-height: 80vh; padding: 0 4%;">
        <div class="section-header">
            <h2 class="section-title">My Watchlist & Favorites</h2>
        </div>
        
        <div class="movies-wrapper" style="position: relative;">
            <div id="mylist-container" class="movies-container" style="flex-wrap: wrap; overflow: visible; display: flex; gap: 20px;">
                </div>
            
            <div id="empty-message" style="display: none; padding: 60px 0; color: #666; font-size: 1.3rem; text-align: center; width: 100%;">
                <i class="fa-regular fa-folder-open" style="font-size: 3rem; margin-bottom: 15px; display: block; color: #444;"></i>
                Your list is currently empty. Go back to Home and add some movies!
            </div>
        </div>
    </section>

    <div id="trailer-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close-btn">&times;</button>
            <div class="video-container">
                <iframe id="trailer-video" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="details-modal" class="modal-overlay">
        <div class="details-modal-content">
            <button class="details-close-btn">&times;</button>
            <div class="details-modal-body">
                <div class="details-left">
                    <img id="modal-movie-img" src="" alt="Movie Poster">
                </div>
                <div class="details-right">
                    <h1 id="modal-movie-title">Movie Title</h1>
                    
                    <div class="details-meta">
                        <span class="details-rating"><i class="fa-solid fa-star"></i> <span id="modal-movie-rating">0.0</span></span>
                        <span id="modal-movie-year">2000</span>
                        <span id="modal-movie-duration">0h 00m</span>
                    </div>

                    <div class="details-genres" id="modal-movie-genres"></div>

                    <p id="modal-movie-desc" class="details-desc">Movie description goes here...</p>
                    
                    <p class="details-cast"><strong>Cast:</strong> <span id="modal-movie-cast">Actor names...</span></p>

                    <div class="details-rating-stars">
                        <span>Your rating:</span>
                        <div class="stars-row">
                            <i class="fa-regular fa-star" data-value="1"></i>
                            <i class="fa-regular fa-star" data-value="2"></i>
                            <i class="fa-regular fa-star" data-value="3"></i>
                            <i class="fa-regular fa-star" data-value="4"></i>
                            <i class="fa-regular fa-star" data-value="5"></i>
                        </div>
                        <span class="rating-status">Not rated</span>
                    </div>

                    <div class="details-modal-btns">
                        <button class="details-btn-play"><i class="fa-solid fa-play"></i> Play Trailer</button>
                        <button class="details-btn-action btn-watchlist"><i class="fa-solid fa-plus"></i> In Watchlist</button>
                        <button class="details-btn-action btn-like"><i class="fa-solid fa-heart"></i> Liked</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
</body>
</html>
